<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bubble Pop - Fuzzel.ie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a1e;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden;touch-action:none}
canvas{display:block;margin:0 auto}
#back-btn{position:fixed;top:10px;left:10px;z-index:50;padding:8px 16px;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);text-decoration:none;transition:background .2s}
#back-btn:hover{background:rgba(255,255,255,.2)}

.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(10,10,30,.92);backdrop-filter:blur(8px);color:#fff;text-align:center;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h1{font-size:clamp(32px,7vw,52px);margin-bottom:8px}
.overlay h2{font-size:clamp(24px,5vw,36px);margin-bottom:8px;color:#ffd93d}
.overlay p{font-size:clamp(14px,3vw,18px);opacity:.8;max-width:380px;line-height:1.5;margin-bottom:8px}
.btn{display:inline-block;padding:14px 40px;font-size:20px;font-weight:700;border:none;border-radius:12px;cursor:pointer;color:#1a1a2e;background:linear-gradient(135deg,#50fa7b,#8be9fd);box-shadow:0 4px 20px rgba(80,250,123,.3);transition:transform .15s;margin-top:16px}
.btn:hover{transform:scale(1.05)}
.how{max-width:360px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px;margin:10px;text-align:left}
.how h3{font-size:16px;color:#50fa7b;margin-bottom:10px;text-align:center}
.how .s{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:14px;opacity:.8}
.how .si{font-size:20px;flex-shrink:0}
</style>
</head>
<body>
<a id="back-btn" href="index.html">← Back</a>

<div class="overlay" id="start-screen">
  <h1>🫧 Bubble Pop</h1>
  <p>Match colors to pop them all!</p>
  <div class="how">
    <h3>How to Play</h3>
    <div class="s"><span class="si">🎯</span><span>Aim with mouse/touch, tap or click to fire</span></div>
    <div class="s"><span class="si">🫧</span><span>Hit bubbles of the same color to pop the whole group</span></div>
    <div class="s"><span class="si">⭐</span><span>Score points for each bubble popped</span></div>
    <div class="s"><span class="si">💀</span><span>Game over if bubbles reach the bottom!</span></div>
  </div>
  <button class="btn" onclick="startGame()">Pop!</button>
</div>

<div class="overlay hidden" id="gameover-screen">
  <h2 id="go-title">Game Over!</h2>
  <p id="go-score" style="font-size:28px;font-weight:700;color:#50fa7b"></p>
  <p id="go-popped" style="color:#8be9fd"></p>
  <button class="btn" onclick="startGame()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const COLS = 10;
const BUBBLE_R = 18;
const BUBBLE_D = BUBBLE_R * 2;
const COLORS = [
  '#e74c3c', // red
  '#3498db', // blue
  '#2ecc71', // green
  '#f1c40f', // yellow
  '#9b59b6', // purple
  '#e91e8b', // pink
];
const COLOR_NAMES = ['Red','Blue','Green','Yellow','Purple','Pink'];

let W, H, ROWS, state, animId;

function resize() {
  W = Math.min(window.innerWidth, COLS * BUBBLE_D + 40);
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); if (state) draw(); });

function gridX(col, row) {
  const offset = (row % 2 === 1) ? BUBBLE_R : 0;
  return 20 + col * BUBBLE_D + BUBBLE_R + offset;
}
function gridY(row) {
  return 40 + row * (BUBBLE_D - 4) + BUBBLE_R;
}

function newState() {
  ROWS = 6;
  const grid = [];
  const numColors = 4;
  for (let r = 0; r < ROWS; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    const row = [];
    for (let c = 0; c < maxC; c++) {
      row.push({ color: Math.floor(Math.random() * numColors), popping: 0 });
    }
    grid.push(row);
  }
  // Add empty rows
  for (let r = ROWS; r < 20; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    grid.push(new Array(maxC).fill(null));
  }

  return {
    running: false,
    grid,
    shooter: { x: W / 2, y: H - 60, angle: -Math.PI / 2, color: Math.floor(Math.random() * numColors), nextColor: Math.floor(Math.random() * numColors) },
    bullet: null,
    aimX: W / 2,
    aimY: H / 2,
    score: 0,
    totalPopped: 0,
    particles: [],
    numColors,
    frame: 0,
    dropping: [],
    level: 1
  };
}

function getNeighbors(row, col) {
  const n = [];
  const maxC = (row % 2 === 1) ? COLS - 1 : COLS;
  // left, right
  if (col > 0) n.push([row, col - 1]);
  if (col < maxC - 1) n.push([row, col + 1]);
  // above and below depend on odd/even row
  const even = row % 2 === 0;
  if (row > 0) {
    const aboveMax = ((row - 1) % 2 === 1) ? COLS - 1 : COLS;
    if (even) {
      if (col - 1 >= 0) n.push([row - 1, col - 1]);
      if (col < aboveMax) n.push([row - 1, col]);
    } else {
      if (col < aboveMax) n.push([row - 1, col]);
      if (col + 1 < aboveMax) n.push([row - 1, col + 1]);
    }
  }
  if (row < state.grid.length - 1) {
    const belowMax = ((row + 1) % 2 === 1) ? COLS - 1 : COLS;
    if (even) {
      if (col - 1 >= 0) n.push([row + 1, col - 1]);
      if (col < belowMax) n.push([row + 1, col]);
    } else {
      if (col < belowMax) n.push([row + 1, col]);
      if (col + 1 < belowMax) n.push([row + 1, col + 1]);
    }
  }
  return n;
}

function findGroup(row, col, color) {
  const visited = new Set();
  const stack = [[row, col]];
  const group = [];
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (visited.has(key)) continue;
    visited.add(key);
    if (r < 0 || r >= state.grid.length) continue;
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    if (c < 0 || c >= maxC) continue;
    const cell = state.grid[r][c];
    if (!cell || cell.color !== color) continue;
    group.push([r, c]);
    for (const nb of getNeighbors(r, c)) stack.push(nb);
  }
  return group;
}

function findFloating() {
  const connected = new Set();
  const stack = [];
  // Start from top row
  const topMax = (0 % 2 === 1) ? COLS - 1 : COLS;
  for (let c = 0; c < topMax; c++) {
    if (state.grid[0][c]) stack.push([0, c]);
  }
  while (stack.length) {
    const [r, c] = stack.pop();
    const key = r + ',' + c;
    if (connected.has(key)) continue;
    connected.add(key);
    for (const [nr, nc] of getNeighbors(r, c)) {
      if (nr >= 0 && nr < state.grid.length) {
        const maxC = (nr % 2 === 1) ? COLS - 1 : COLS;
        if (nc >= 0 && nc < maxC && state.grid[nr][nc] && !connected.has(nr + ',' + nc)) {
          stack.push([nr, nc]);
        }
      }
    }
  }
  const floating = [];
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      if (state.grid[r][c] && !connected.has(r + ',' + c)) {
        floating.push([r, c]);
      }
    }
  }
  return floating;
}

function snapBullet(bx, by) {
  let bestR = -1, bestC = -1, bestDist = Infinity;
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      if (state.grid[r][c]) continue;
      const gx = gridX(c, r), gy = gridY(r);
      const d = Math.hypot(bx - gx, by - gy);
      if (d < bestDist && d < BUBBLE_D * 1.2) {
        bestDist = d;
        bestR = r;
        bestC = c;
      }
    }
  }
  return [bestR, bestC];
}

function spawnPopParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 3;
    state.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 3 + Math.random() * 4, life: 1, decay: 0.025 + Math.random() * 0.02, color });
  }
}

function popGroup(group) {
  const color = COLORS[state.grid[group[0][0]][group[0][1]].color];
  for (const [r, c] of group) {
    spawnPopParticles(gridX(c, r), gridY(r), color);
    state.grid[r][c] = null;
  }
  state.score += group.length * 10;
  state.totalPopped += group.length;

  // Drop floating
  const floating = findFloating();
  for (const [r, c] of floating) {
    const cell = state.grid[r][c];
    spawnPopParticles(gridX(c, r), gridY(r), COLORS[cell.color]);
    state.grid[r][c] = null;
    state.score += 15;
    state.totalPopped++;
  }
}

function checkGameOver() {
  const limit = H - 120;
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      if (state.grid[r][c] && gridY(r) + BUBBLE_R > limit) return true;
    }
  }
  return false;
}

function hasRemainingBubbles() {
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      if (state.grid[r][c]) return true;
    }
  }
  return false;
}

function getActiveColors() {
  const set = new Set();
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      if (state.grid[r][c]) set.add(state.grid[r][c].color);
    }
  }
  return [...set];
}

function nextBubbleColor() {
  const active = getActiveColors();
  if (active.length === 0) return Math.floor(Math.random() * state.numColors);
  return active[Math.floor(Math.random() * active.length)];
}

// ── Drawing ──
function drawBubble(x, y, colorIdx, r, alpha) {
  ctx.globalAlpha = alpha || 1;
  const color = COLORS[colorIdx];
  const grd = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.3, color);
  grd.addColorStop(1, color + 'aa');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.beginPath();
  ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGrid() {
  for (let r = 0; r < state.grid.length; r++) {
    const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      const cell = state.grid[r][c];
      if (!cell) continue;
      const x = gridX(c, r), y = gridY(r);
      const popScale = cell.popping > 0 ? 1 + cell.popping * 0.3 : 1;
      const popAlpha = cell.popping > 0 ? 1 - cell.popping : 1;
      drawBubble(x, y, cell.color, BUBBLE_R * popScale, popAlpha);
    }
  }
}

function drawShooter() {
  const s = state.shooter;
  // Aim line
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(s.x, s.y);
  const len = 200;
  ctx.lineTo(s.x + Math.cos(s.angle) * len, s.y + Math.sin(s.angle) * len);
  ctx.stroke();
  ctx.setLineDash([]);

  // Current bubble
  drawBubble(s.x, s.y, s.color, BUBBLE_R);

  // Next bubble (small preview)
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', s.x - 50, s.y - 12);
  drawBubble(s.x - 50, s.y + 8, s.nextColor, BUBBLE_R * 0.6);
}

function drawBullet() {
  if (!state.bullet) return;
  drawBubble(state.bullet.x, state.bullet.y, state.bullet.color, BUBBLE_R);
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(state.score, W - 16, 30);
  ctx.font = '12px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.fillText(state.totalPopped + ' popped', W - 16, 48);

  // Danger line
  const limit = H - 120;
  ctx.strokeStyle = 'rgba(255,50,50,.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(0, limit);
  ctx.lineTo(W, limit);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Update ──
function update() {
  state.frame++;

  // Bullet
  if (state.bullet) {
    const b = state.bullet;
    b.x += b.vx;
    b.y += b.vy;

    // Wall bounce
    if (b.x - BUBBLE_R < 20) { b.x = 20 + BUBBLE_R; b.vx = -b.vx; }
    if (b.x + BUBBLE_R > W - 20) { b.x = W - 20 - BUBBLE_R; b.vx = -b.vx; }

    // Hit ceiling
    if (b.y - BUBBLE_R < 40) {
      placeBullet(b);
      return;
    }

    // Hit existing bubble
    for (let r = 0; r < state.grid.length; r++) {
      const maxC = (r % 2 === 1) ? COLS - 1 : COLS;
      for (let c = 0; c < maxC; c++) {
        if (!state.grid[r][c]) continue;
        const gx = gridX(c, r), gy = gridY(r);
        if (Math.hypot(b.x - gx, b.y - gy) < BUBBLE_D - 2) {
          placeBullet(b);
          return;
        }
      }
    }
  }

  // Particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

function placeBullet(b) {
  const [r, c] = snapBullet(b.x, b.y);
  state.bullet = null;

  if (r < 0) return;

  state.grid[r][c] = { color: b.color, popping: 0 };

  // Find matching group
  const group = findGroup(r, c, b.color);
  if (group.length >= 3) {
    popGroup(group);

    if (!hasRemainingBubbles()) {
      gameOver(true);
      return;
    }
  }

  if (checkGameOver()) {
    gameOver(false);
    return;
  }

  // Next color
  state.shooter.color = state.shooter.nextColor;
  state.shooter.nextColor = nextBubbleColor();
}

function fire() {
  if (state.bullet || !state.running) return;
  const s = state.shooter;
  const speed = 10;
  state.bullet = {
    x: s.x, y: s.y,
    vx: Math.cos(s.angle) * speed,
    vy: Math.sin(s.angle) * speed,
    color: s.color
  };
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a1e');
  bg.addColorStop(1, '#16213e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawBullet();
  drawShooter();
  drawParticles();
  drawHUD();
}

function loop() {
  if (!state || !state.running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Controls ──
function updateAim(x, y) {
  if (!state) return;
  const s = state.shooter;
  const dx = x - s.x, dy = y - s.y;
  let angle = Math.atan2(dy, dx);
  angle = Math.max(-Math.PI + 0.15, Math.min(-0.15, angle));
  s.angle = angle;
}

canvas.addEventListener('mousemove', e => updateAim(e.offsetX, e.offsetY));
canvas.addEventListener('click', e => { updateAim(e.offsetX, e.offsetY); fire(); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  updateAim(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  updateAim(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); fire(); }, { passive: false });
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); fire(); } });

// ── Game lifecycle ──
function startGame() {
  resize();
  state = newState();
  state.running = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function gameOver(won) {
  state.running = false;
  document.getElementById('go-title').textContent = won ? '🎉 All Clear!' : '💥 Game Over!';
  document.getElementById('go-score').textContent = 'Score: ' + state.score;
  document.getElementById('go-popped').textContent = state.totalPopped + ' bubbles popped';
  document.getElementById('gameover-screen').classList.remove('hidden');
}
</script>
</body>
</html>
