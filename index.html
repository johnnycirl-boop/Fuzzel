<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuzzel.ie - Games</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: -1;
    animation: floatBlob 20s ease-in-out infinite;
  }
  .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #ff79c6, #bd93f9); top: -10%; left: -5%; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #8be9fd, #50fa7b); top: 50%; right: -8%; animation-delay: -7s; }
  .blob-3 { width: 350px; height: 350px; background: radial-gradient(circle, #f1fa8c, #ffb86c); bottom: -5%; left: 20%; animation-delay: -14s; }

  @keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -40px) scale(1.1); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(15px, 35px) scale(1.05); }
  }

  .homepage {
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    justify-content: center;
  }

  .logo-wrap {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(ellipse, rgba(189,147,249,0.15) 0%, transparent 70%);
    z-index: -1;
    border-radius: 50%;
  }

  .hero-logo {
    width: 525px;
    max-width: 80%;
    height: auto;
    margin-bottom: -40px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
  }

  .site-title {
    font-size: 2.4rem;
    text-align: center;
    background: linear-gradient(90deg, #ff79c6, #f1fa8c, #50fa7b, #8be9fd, #bd93f9);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease infinite;
    margin-bottom: 8px;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .tagline {
    color: #c3a6ff;
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 50px;
    text-align: center;
  }

  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
  }

  .tile {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 0;
    text-align: center;
    text-decoration: none;
    color: #fff;
    transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .tile-screenshot {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    object-position: top;
    border-radius: 20px 20px 0 0;
  }

  .tile-info {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .tile:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }

  .tile-icon {
    font-size: 3.5rem;
    line-height: 1;
  }

  .tile-name {
    font-size: 1.4rem;
    font-weight: 700;
  }

  .tile-desc {
    font-size: 0.9rem;
    color: #aaa;
    line-height: 1.4;
  }

  .tile-fuzzel:hover { border-color: #bd93f9; box-shadow: 0 12px 40px rgba(189,147,249,0.15); }
  .tile-battleship:hover { border-color: #d4a843; box-shadow: 0 12px 40px rgba(212,168,67,0.15); }

  /* Welcome Modal */
  .welcome-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.4s ease;
  }
  .welcome-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .welcome-card {
    background: linear-gradient(135deg, #1e1e3a 0%, #1a1a40 100%);
    border: 1px solid rgba(189, 147, 249, 0.3);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(189, 147, 249, 0.1);
  }

  .welcome-img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 15%;
    border: 3px solid rgba(189, 147, 249, 0.5);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    margin-bottom: 20px;
  }

  .welcome-msg {
    font-size: 1.15rem;
    line-height: 1.6;
    color: #e2d8f5;
    margin-bottom: 24px;
  }

  .welcome-msg strong {
    background: linear-gradient(90deg, #ff79c6, #f1fa8c, #50fa7b, #8be9fd);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease infinite;
    font-weight: 700;
  }

  .btn-play {
    background: linear-gradient(135deg, #bd93f9, #ff79c6);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-play:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(189, 147, 249, 0.4);
  }

  @media (max-width: 500px) {
    .tiles { grid-template-columns: 1fr; gap: 16px; }
    .hero-logo { width: 360px; }
    .tile { padding: 0; }
  }
</style>
</head>
<body>

<div class="welcome-overlay" id="welcomeModal">
  <div class="welcome-card">
    <img src="mae-good.png" alt="Mae" class="welcome-img">
    <div class="welcome-msg">Welcome to <strong>Mae's</strong> games — pick one and see can you beat her Dad on the leaderboard!</div>
    <button class="btn-play" onclick="document.getElementById('welcomeModal').classList.add('hidden')">Let's Play!</button>
  </div>
</div>

<div class="bg-layer"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="homepage">
  <div class="logo-wrap">
    <img src="logonew.png" alt="Fuzzel.ie" class="hero-logo">
  </div>
  <h1 class="site-title">Fuzzel.ie</h1>
  <p class="tagline">Pick a game and play!</p>

  <div class="tiles">
    <a href="fuzzel.html" class="tile tile-fuzzel">
      <img src="tile-fuzzel.png" alt="Fuzzle gameplay" class="tile-screenshot">
      <div class="tile-info">
        <div class="tile-name">Fuzzle</div>
        <div class="tile-desc">Decode the clue, crack the word!</div>
      </div>
    </a>
    <a href="battleship.html" class="tile tile-battleship">
      <img src="tile-battleship.png" alt="Battleship gameplay" class="tile-screenshot">
      <div class="tile-info">
        <div class="tile-name">Daphlship</div>
        <div class="tile-desc">Pirates vs Navy &mdash; sink the fleet!</div>
      </div>
    </a>
  </div>
</div>

</body>
</html>
