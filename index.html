<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuzzle - Decode the Clue, Crack the Word!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Animated background ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  }

  /* Soft floating blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: -1;
    animation: floatBlob 20s ease-in-out infinite;
  }
  .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #ff79c6, #bd93f9); top: -10%; left: -5%; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #8be9fd, #50fa7b); top: 50%; right: -8%; animation-delay: -7s; }
  .blob-3 { width: 350px; height: 350px; background: radial-gradient(circle, #f1fa8c, #ffb86c); bottom: -5%; left: 20%; animation-delay: -14s; }
  .blob-4 { width: 300px; height: 300px; background: radial-gradient(circle, #ff6e96, #ff79c6); top: 30%; left: 50%; animation-delay: -4s; }
  .blob-5 { width: 250px; height: 250px; background: radial-gradient(circle, #c3a6ff, #8be9fd); top: 10%; right: 25%; animation-delay: -11s; }

  @keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -40px) scale(1.1); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(15px, 35px) scale(1.05); }
  }

  /* Flower / soft SVG decorations */
  .deco {
    position: fixed;
    z-index: -1;
    opacity: 0.08;
    pointer-events: none;
  }
  .deco-flower-1 { top: 5%; left: 3%; font-size: 120px; animation: spinSlow 30s linear infinite; }
  .deco-flower-2 { bottom: 8%; right: 4%; font-size: 100px; animation: spinSlow 25s linear infinite reverse; }
  .deco-flower-3 { top: 45%; left: 85%; font-size: 90px; animation: spinSlow 35s linear infinite; }
  .deco-star-1 { top: 15%; right: 15%; font-size: 80px; animation: pulse 4s ease-in-out infinite; }
  .deco-star-2 { bottom: 20%; left: 10%; font-size: 60px; animation: pulse 5s ease-in-out infinite 1s; }
  .deco-cloud-1 { top: 60%; left: 5%; font-size: 110px; animation: floatBlob 18s ease-in-out infinite; }
  .deco-cloud-2 { top: 8%; right: 8%; font-size: 80px; animation: floatBlob 22s ease-in-out infinite 5s; }

  @keyframes spinSlow { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.08; } 50% { transform: scale(1.15); opacity: 0.14; } }

  /* ── Layout ── */
  .game-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    font-size: 2.6rem;
    text-align: center;
    background: linear-gradient(90deg, #ff79c6, #f1fa8c, #50fa7b, #8be9fd, #bd93f9);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease infinite;
    text-shadow: none;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle { color: #c3a6ff; font-size: 1rem; margin-top: 4px; text-align: center; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 18px;
    border-radius: 24px;
    font-size: 0.95rem;
  }

  .stat-pill .label { color: #bd93f9; }
  .stat-pill .value { color: #50fa7b; font-weight: bold; }

  .streak-fire { color: #ffb86c; display: none; margin-left: 4px; }
  .streak-fire.show { display: inline; }

  /* Difficulty */
  .diff-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .diff-btn {
    padding: 7px 18px;
    border-radius: 20px;
    font-size: 0.85rem;
    border: 2px solid transparent;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  .diff-btn:hover { transform: translateY(-1px); }
  .diff-easy { background: rgba(80,250,123,0.15); color: #50fa7b; }
  .diff-medium { background: rgba(241,250,140,0.15); color: #f1fa8c; }
  .diff-hard { background: rgba(255,85,85,0.15); color: #ff5555; }
  .diff-btn.active { border-color: currentColor; box-shadow: 0 0 14px rgba(255,255,255,0.1); }

  /* ── Phase sections ── */
  .phase-section {
    width: 100%;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px 20px;
    margin-top: 18px;
    transition: all 0.4s;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .phase-number {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9rem;
  }

  .phase-1 .phase-number { background: linear-gradient(135deg, #ff79c6, #bd93f9); }
  .phase-2 .phase-number { background: linear-gradient(135deg, #50fa7b, #8be9fd); }

  .phase-title { font-size: 1.1rem; font-weight: 600; }
  .phase-1 .phase-title { color: #ff79c6; }
  .phase-2 .phase-title { color: #8be9fd; }

  .category-badge {
    display: inline-block;
    background: rgba(139,233,253,0.15);
    border: 1px solid rgba(139,233,253,0.3);
    color: #8be9fd;
    padding: 3px 12px;
    border-radius: 10px;
    font-size: 0.8rem;
    margin-left: auto;
  }

  /* ── Clue word display ── */
  .clue-display {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 10px 0 16px;
  }

  .clue-letter-box {
    width: 56px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    font-weight: bold;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
    user-select: none;
  }

  .clue-letter-box .letter { position: relative; z-index: 1; transition: all 0.5s; }

  .disguise-clip-top .letter { clip-path: inset(50% 0 0 0); color: #ff79c6; }
  .disguise-clip-bottom .letter { clip-path: inset(0 0 45% 0); color: #8be9fd; }
  .disguise-blur .letter { filter: blur(3.5px); color: #f1fa8c; }
  .disguise-rotate .letter { transform: rotate(180deg); color: #50fa7b; }
  .disguise-squish .letter { transform: scaleX(0.22); color: #ffb86c; }
  .disguise-ghost .letter { opacity: 0.1; color: #bd93f9; }
  .disguise-mirror .letter { transform: scaleX(-1); color: #ff6e96; }
  .disguise-none .letter { color: #f8f8f2; }

  .clue-letter-box.revealed { background: rgba(80,250,123,0.12) !important; border-color: rgba(80,250,123,0.4) !important; }
  .clue-letter-box.revealed .letter {
    clip-path: none !important; filter: none !important; transform: none !important;
    opacity: 1 !important; color: #50fa7b !important;
  }

  .clue-input-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  .clue-input {
    font-size: 1.2rem;
    padding: 10px 18px;
    border-radius: 12px;
    border: 2px solid #bd93f9;
    background: rgba(255,255,255,0.06);
    color: #f8f8f2;
    width: 220px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: border-color 0.3s;
  }

  .clue-input:focus { border-color: #ff79c6; }

  .btn {
    font-size: 1rem;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-decode { background: linear-gradient(135deg, #ff79c6, #bd93f9); color: #fff; }
  .btn-hint-clue { background: linear-gradient(135deg, #f1fa8c, #ffb86c); color: #1a1a2e; }
  .btn-skip-clue { background: rgba(255,255,255,0.08); color: #ff5555; border: 1px solid rgba(255,85,85,0.4); }

  .clue-message {
    text-align: center;
    margin-top: 10px;
    min-height: 24px;
    font-size: 1rem;
  }

  .clue-message.correct { color: #50fa7b; }
  .clue-message.wrong { color: #ff5555; animation: shake 0.35s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .attempts-dots {
    display: flex; gap: 5px; justify-content: center; margin-top: 8px;
  }

  .att-dot {
    width: 12px; height: 12px; border-radius: 50%; background: #50fa7b; transition: background 0.3s;
  }

  .att-dot.used { background: #ff5555; }

  /* ── Phase 2: Wordle grid ── */
  .phase-2 { opacity: 0.4; pointer-events: none; transition: all 0.5s; }
  .phase-2.active { opacity: 1; pointer-events: auto; }

  .shared-letters-info {
    text-align: center;
    color: #f1fa8c;
    font-size: 0.9rem;
    margin-bottom: 12px;
    min-height: 22px;
  }

  .wordle-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    margin-bottom: 16px;
  }

  .wordle-row {
    display: flex;
    gap: 6px;
  }

  .wordle-cell {
    width: 64px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: bold;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    text-transform: uppercase;
    transition: all 0.3s;
    color: #f8f8f2;
  }

  .wordle-cell.filled { border-color: rgba(255,255,255,0.35); }
  .wordle-cell.current-row { border-color: rgba(189,147,249,0.5); }

  .wordle-cell.correct-spot {
    background: rgba(80,250,123,0.35);
    border-color: #50fa7b;
    color: #50fa7b;
  }

  .wordle-cell.wrong-spot {
    background: rgba(241,250,140,0.3);
    border-color: #f1fa8c;
    color: #f1fa8c;
  }

  .wordle-cell.not-in-word {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
  }

  .wordle-cell.hint-letter {
    background: rgba(189,147,249,0.2);
    border-color: rgba(189,147,249,0.4);
    color: #bd93f9;
    font-size: 1rem;
  }

  .wordle-cell.pop { animation: pop 0.2s; }
  @keyframes pop { 50% { transform: scale(1.15); } }

  .wordle-cell.flip {
    animation: flip 0.5s;
  }
  @keyframes flip {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  /* ── On-screen keyboard ── */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    margin-top: 4px;
  }

  .kb-row { display: flex; gap: 5px; }

  .kb-key {
    min-width: 36px;
    height: 46px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255,255,255,0.12);
    color: #f8f8f2;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
  }

  .kb-key:hover { background: rgba(255,255,255,0.2); }
  .kb-key.wide { min-width: 60px; font-size: 0.75rem; }
  .kb-key.correct-spot { background: rgba(80,250,123,0.5); color: #50fa7b; }
  .kb-key.wrong-spot { background: rgba(241,250,140,0.4); color: #f1fa8c; }
  .kb-key.not-in-word { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.2); }

  .wordle-message {
    text-align: center;
    font-size: 1.2rem;
    min-height: 30px;
    margin-top: 10px;
  }

  .wordle-message.correct { color: #50fa7b; }
  .wordle-message.wrong { color: #ff5555; }

  /* ── Connection reveal ── */
  .connection-reveal {
    display: none;
    text-align: center;
    margin-top: 14px;
    padding: 14px 20px;
    background: rgba(241,250,140,0.08);
    border: 1px solid rgba(241,250,140,0.2);
    border-radius: 14px;
    animation: fadeSlideIn 0.5s ease;
  }

  .connection-reveal.show { display: block; }

  .connection-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #bd93f9;
    margin-bottom: 6px;
  }

  .connection-text {
    font-size: 1.1rem;
    color: #f1fa8c;
    font-weight: 600;
  }

  .connection-words {
    margin-top: 6px;
    font-size: 0.95rem;
    color: #8be9fd;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Next round button ── */
  .btn-next {
    display: none;
    margin-top: 16px;
    background: linear-gradient(135deg, #50fa7b, #8be9fd);
    color: #1a1a2e;
    font-size: 1.15rem;
    padding: 13px 36px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.15s;
  }

  .btn-next:hover { transform: translateY(-2px); }
  .btn-next.show { display: inline-block; }

  /* ── Game over overlay ── */
  .game-over {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(10,10,20,0.92);
    backdrop-filter: blur(20px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .game-over.show { display: flex; }

  .game-over h2 {
    font-size: 2.6rem;
    background: linear-gradient(90deg, #f1fa8c, #ffb86c, #ff79c6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .game-over .final-score { font-size: 3rem; color: #50fa7b; font-weight: bold; }
  .game-over .final-details { color: #8be9fd; font-size: 1.1rem; }

  .btn-restart {
    background: linear-gradient(135deg, #50fa7b, #8be9fd);
    color: #1a1a2e;
    font-size: 1.2rem;
    padding: 14px 40px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    margin-top: 10px;
    transition: transform 0.15s;
  }

  .btn-restart:hover { transform: translateY(-2px); }

  /* ── Confetti ── */
  .confetti {
    position: fixed;
    top: -12px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    to { top: 105vh; transform: rotate(900deg) translateX(40px); }
  }

  /* ── Trophy button ── */
  .btn-trophy {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(241,250,140,0.3);
    color: #f1fa8c;
    padding: 8px 14px;
    border-radius: 24px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-trophy:hover { background: rgba(241,250,140,0.15); transform: translateY(-1px); }

  /* ── Leaderboard modal ── */
  .lb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 150;
    background: rgba(10,10,20,0.92);
    backdrop-filter: blur(20px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: fadeSlideIn 0.3s ease;
  }

  .lb-overlay.show { display: flex; }

  .lb-title {
    font-size: 2rem;
    background: linear-gradient(90deg, #f1fa8c, #ffb86c, #ff79c6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .lb-table {
    width: 90%;
    max-width: 500px;
    border-collapse: collapse;
  }

  .lb-table th {
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #bd93f9;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(189,147,249,0.2);
  }

  .lb-table td {
    padding: 10px 12px;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: #f8f8f2;
  }

  .lb-table tr.current-player td {
    color: #50fa7b;
    font-weight: bold;
  }

  .lb-table .rank-cell { width: 50px; text-align: center; font-size: 1.2rem; }
  .rank-gold { color: #f1fa8c; }
  .rank-silver { color: #c0c0c0; }
  .rank-bronze { color: #cd7f32; }

  .lb-table .score-cell { text-align: right; color: #50fa7b; font-weight: bold; }
  .lb-table .diff-cell { text-align: center; }
  .lb-table .date-cell { text-align: right; color: rgba(255,255,255,0.4); font-size: 0.8rem; }

  .lb-empty {
    color: rgba(255,255,255,0.3);
    font-size: 1rem;
    text-align: center;
    padding: 30px;
  }

  .btn-close-lb {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #8be9fd;
    padding: 10px 30px;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    margin-top: 8px;
    transition: all 0.15s;
  }

  .btn-close-lb:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  /* ── Name entry on game over ── */
  .go-name-entry {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .go-name-input {
    font-size: 1.2rem;
    padding: 12px 18px;
    border-radius: 14px;
    border: 2px solid #bd93f9;
    background: rgba(255,255,255,0.07);
    color: #f8f8f2;
    width: 200px;
    outline: none;
    text-align: center;
    letter-spacing: 1px;
    transition: border-color 0.3s;
  }

  .go-name-input:focus { border-color: #50fa7b; }

  .btn-save-score {
    background: linear-gradient(135deg, #f1fa8c, #ffb86c);
    color: #1a1a2e;
    font-size: 1.1rem;
    padding: 12px 28px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.15s;
  }

  .btn-save-score:hover { transform: translateY(-2px); }

  .go-leaderboard {
    width: 90%;
    max-width: 500px;
    margin-top: 10px;
  }

  .go-saved-msg {
    color: #50fa7b;
    font-size: 0.95rem;
    min-height: 24px;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    h1 { font-size: 1.8rem; }
    .clue-letter-box { width: 44px; height: 54px; font-size: 1.9rem; }
    .wordle-cell { width: 52px; height: 56px; font-size: 1.6rem; }
    .kb-key { min-width: 28px; height: 40px; font-size: 0.8rem; }
    .phase-section { padding: 16px 12px; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>
<div class="blob blob-5"></div>

<!-- Soft decorations -->
<div class="deco deco-flower-1">&#10048;</div>
<div class="deco deco-flower-2">&#10047;</div>
<div class="deco deco-flower-3">&#10046;</div>
<div class="deco deco-star-1">&#10022;</div>
<div class="deco deco-star-2">&#10038;</div>
<div class="deco deco-cloud-1">&#9729;</div>
<div class="deco deco-cloud-2">&#9731;</div>

<div class="game-container">

  <h1>Fuzzle</h1>
  <p class="subtitle">Decode the clue, crack the word!</p>

  <div class="diff-row">
    <button class="btn diff-btn diff-easy active" onclick="setDifficulty('easy')">Easy</button>

<script>

  ["GALAXY","SPIN","space","Galaxies spin through space"],
  ["SATURN","RING","space","Saturn has rings"],
  ["HUBBLE","LENS","space","The Hubble uses a giant lens"],
  ["PULSAR","BEAM","space","Pulsars emit beams of light"],

const DISGUISES = ['clip-top','clip-bottom','blur','rotate','squish','ghost','mirror'];

const DIFFICULTY_SETTINGS = {
  easy:   { clueHide: 0.35, clueAttempts: 4, clueHints: 3, wordleGuesses: 6, cluePoints: 15, wordlePoints: 25 },
  medium: { clueHide: 0.55, clueAttempts: 3, clueHints: 2, wordleGuesses: 5, cluePoints: 20, wordlePoints: 35 },
  hard:   { clueHide: 0.75, clueAttempts: 2, clueHints: 1, wordleGuesses: 4, cluePoints: 30, wordlePoints: 50 },
};

let difficulty = 'easy';
let score = 0;
let roundNum = 0;
let streak = 0;
let bestStreak = 0;
const totalRounds = 10;

let clueWord = '';
let mysteryWord = '';
let category = '';
let connection = '';
let clueAttemptsLeft = 0;
let clueHintsLeft = 0;
let clueRevealed = new Set();

// Wordle state
let wordleCurrentRow = 0;
let wordleCurrentCol = 0;
let wordleMaxGuesses = 6;
let wordleGrid = [];      // 2D array of letters
let wordleStates = [];     // 2D array of states
let keyStates = {};
let wordleSolved = false;
let roundOver = false;
let usedPairIndices = new Set();

const settings = () => DIFFICULTY_SETTINGS[difficulty];

/* ── Difficulty ── */
function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-${d}`).classList.add('active');
  restartGame();
}

/* ── Pick a pair ── */
function pickPair() {
  let idx, tries = 0;
  do {
    idx = Math.floor(Math.random() * WORD_PAIRS.length);
    tries++;
  } while (usedPairIndices.has(idx) && tries < 300);
  usedPairIndices.add(idx);
  const [cw, mw, cat, conn] = WORD_PAIRS[idx];
  return [cw, mw, cat, conn];
}

/* ── Phase 1: Build clue display ── */
function buildClueDisplay() {
  const el = document.getElementById('clueDisplay');
  el.innerHTML = '';
  clueRevealed = new Set();

  const numHidden = Math.max(1, Math.round(clueWord.length * settings().clueHide));
  const indices = [...Array(clueWord.length).keys()];
  const shuffled = indices.sort(() => Math.random() - 0.5);
  const hiddenSet = new Set(shuffled.slice(0, numHidden));

  for (let i = 0; i < clueWord.length; i++) {
    const box = document.createElement('div');
    box.className = 'clue-letter-box';
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = clueWord[i];

    if (hiddenSet.has(i)) {
      box.classList.add(`disguise-${DISGUISES[Math.floor(Math.random() * DISGUISES.length)]}`);
    } else {
      box.classList.add('disguise-none');
      clueRevealed.add(i);
    }

    box.appendChild(span);
    el.appendChild(box);
    box.style.opacity = '0'; box.style.transform = 'translateY(16px)';
    setTimeout(() => { box.style.opacity = '1'; box.style.transform = 'translateY(0)'; }, i * 70);
  }
}

function renderClueAttempts() {
  const el = document.getElementById('clueAttempts');
  el.innerHTML = '';
  for (let i = 0; i < settings().clueAttempts; i++) {
    const d = document.createElement('div');
    d.className = 'att-dot' + (i >= clueAttemptsLeft ? ' used' : '');
    el.appendChild(d);
  }
}

function revealAllClue() {
  document.querySelectorAll('.clue-letter-box').forEach(b => b.classList.add('revealed'));
}

function checkClue() {
  const input = document.getElementById('clueInput');
  const guess = input.value.trim().toUpperCase();
  if (!guess) return;
  const msg = document.getElementById('clueMessage');

  if (guess === clueWord) {
    msg.textContent = `Yes! The clue is "${clueWord}"`;
    msg.className = 'clue-message correct';
    score += settings().cluePoints;
    document.getElementById('score').textContent = score;
    revealAllClue();
    input.disabled = true;
    activatePhase2(true);
  } else {
    clueAttemptsLeft--;
    renderClueAttempts();
    if (clueAttemptsLeft <= 0) {
      msg.textContent = `It was "${clueWord}" — but you can still solve the mystery!`;
      msg.className = 'clue-message wrong';
      revealAllClue();
      input.disabled = true;
      activatePhase2(false);
    } else {
      msg.textContent = `Not quite! ${clueAttemptsLeft} tries left`;
      msg.className = 'clue-message wrong';
      void msg.offsetWidth;
      msg.className = 'clue-message wrong';
    }
  }
  input.value = '';
}

function revealClueHint() {
  if (clueHintsLeft <= 0) return;
  const boxes = document.querySelectorAll('.clue-letter-box');
  const hidden = [];
  boxes.forEach((b, i) => { if (!clueRevealed.has(i)) hidden.push(i); });
  if (!hidden.length) return;
  const idx = hidden[Math.floor(Math.random() * hidden.length)];
  boxes[idx].classList.add('revealed');
  clueRevealed.add(idx);
  clueHintsLeft--;
}

function skipClue() {
  document.getElementById('clueMessage').textContent = `Skipped! It was "${clueWord}"`;
  document.getElementById('clueMessage').className = 'clue-message wrong';
  revealAllClue();
  document.getElementById('clueInput').disabled = true;
  activatePhase2(false);
}

/* ── Phase 2: Wordle ── */
function activatePhase2(decodedClue) {
  const p2 = document.getElementById('phase2');
  p2.classList.add('active');

  wordleMaxGuesses = settings().wordleGuesses;
  wordleCurrentRow = 0;
  wordleCurrentCol = 0;
  wordleGrid = Array.from({ length: wordleMaxGuesses }, () => Array(mysteryWord.length).fill(''));
  wordleStates = Array.from({ length: wordleMaxGuesses }, () => Array(mysteryWord.length).fill(''));
  keyStates = {};
  wordleSolved = false;

  // Shared letters
  const clueSet = new Set(clueWord.split(''));
  const mysterySet = new Set(mysteryWord.split(''));
  const shared = [...clueSet].filter(l => mysterySet.has(l));

  const info = document.getElementById('sharedInfo');
  const hints = [];
  if (decodedClue) {
    hints.push(`The clue "${clueWord}" is connected to a ${mysteryWord.length}-letter word`);
  } else {
    hints.push(`Find the ${mysteryWord.length}-letter word connected to "${clueWord}"`);
  }
  if (shared.length > 0) {
    hints.push(`Shared letters: ${shared.join(', ')}`);
  }
  info.textContent = hints.join(' \u2022 ');

  buildWordleGrid(shared);
  buildKeyboard();

  setTimeout(() => p2.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}

function buildWordleGrid(sharedLetters) {
  const container = document.getElementById('wordleGrid');
  container.innerHTML = '';

  for (let r = 0; r < wordleMaxGuesses; r++) {
    const row = document.createElement('div');
    row.className = 'wordle-row';
    for (let c = 0; c < mysteryWord.length; c++) {
      const cell = document.createElement('div');
      cell.className = 'wordle-cell';
      cell.id = `wc-${r}-${c}`;
      if (r === 0) cell.classList.add('current-row');
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}

function buildKeyboard() {
  const rows = [
    'Q W E R T Y U I O P'.split(' '),
    'A S D F G H J K L'.split(' '),
    ['ENTER', ...'Z X C V B N M'.split(' '), 'DEL']
  ];

  const container = document.getElementById('keyboard');
  container.innerHTML = '';

  rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'kb-key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.id = `kb-${key}`;
      btn.addEventListener('click', () => handleKey(key));
      rowEl.appendChild(btn);
    });
    container.appendChild(rowEl);
  });
}

function handleKey(key) {
  if (wordleSolved || roundOver) return;

  if (key === 'ENTER') {
    submitWordleGuess();
  } else if (key === 'DEL') {
    if (wordleCurrentCol > 0) {
      wordleCurrentCol--;
      wordleGrid[wordleCurrentRow][wordleCurrentCol] = '';
      updateCell(wordleCurrentRow, wordleCurrentCol, '');
    }
  } else {
    if (wordleCurrentCol < mysteryWord.length) {
      wordleGrid[wordleCurrentRow][wordleCurrentCol] = key;
      const cell = updateCell(wordleCurrentRow, wordleCurrentCol, key);
      cell.classList.add('pop');
      setTimeout(() => cell.classList.remove('pop'), 200);
      wordleCurrentCol++;
    }
  }
}

function updateCell(r, c, letter) {
  const cell = document.getElementById(`wc-${r}-${c}`);
  cell.textContent = letter;
  cell.className = 'wordle-cell' + (letter ? ' filled' : '') + (r === wordleCurrentRow ? ' current-row' : '');
  if (wordleStates[r][c]) cell.classList.add(wordleStates[r][c]);
  return cell;
}

function submitWordleGuess() {
  const row = wordleGrid[wordleCurrentRow];
  const guess = row.join('');
  if (guess.length < mysteryWord.length) return;

  // Evaluate
  const states = evaluateGuess(guess, mysteryWord);

  // Animate reveal
  for (let c = 0; c < mysteryWord.length; c++) {
    const cell = document.getElementById(`wc-${wordleCurrentRow}-${c}`);
    setTimeout(() => {
      cell.classList.add('flip');
      setTimeout(() => {
        wordleStates[wordleCurrentRow][c] = states[c];
        cell.className = `wordle-cell filled ${states[c]}`;
      }, 250);
    }, c * 120);
  }

  // Update keyboard colors after animation
  setTimeout(() => {
    for (let c = 0; c < guess.length; c++) {
      const letter = guess[c];
      const state = states[c];
      const existing = keyStates[letter];
      // Priority: correct-spot > wrong-spot > not-in-word
      if (state === 'correct-spot' || (!existing)) {
        keyStates[letter] = state;
      } else if (state === 'wrong-spot' && existing !== 'correct-spot') {
        keyStates[letter] = state;
      }
      const kbKey = document.getElementById(`kb-${letter}`);
      if (kbKey) kbKey.className = `kb-key ${keyStates[letter]}`;
    }

    const msg = document.getElementById('wordleMessage');

    if (guess === mysteryWord) {
      wordleSolved = true;
      const guessBonus = (wordleMaxGuesses - wordleCurrentRow) * 8;
      score += settings().wordlePoints + guessBonus;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;

      const fire = document.getElementById('streakFire');
      fire.classList.toggle('show', streak >= 3);

      const msgs = ['Genius!','Brilliant!','Awesome!','Great!','Nice!','Phew!'];
      msg.textContent = `${msgs[Math.min(wordleCurrentRow, msgs.length-1)]} +${settings().wordlePoints + (wordleMaxGuesses - wordleCurrentRow) * 8} pts`;
      msg.className = 'wordle-message correct';
      spawnConfetti();
      showNextOrEnd();
    } else {
      wordleCurrentRow++;
      wordleCurrentCol = 0;
      if (wordleCurrentRow >= wordleMaxGuesses) {
        msg.textContent = `The word was: ${mysteryWord}`;
        msg.className = 'wordle-message wrong';
        streak = 0;
        document.getElementById('streak').textContent = 0;
        document.getElementById('streakFire').classList.remove('show');
        showNextOrEnd();
      } else {
        // Highlight new current row
        for (let c = 0; c < mysteryWord.length; c++) {
          const cell = document.getElementById(`wc-${wordleCurrentRow}-${c}`);
          cell.classList.add('current-row');
        }
      }
    }
  }, mysteryWord.length * 120 + 300);
}

function evaluateGuess(guess, answer) {
  const states = Array(answer.length).fill('not-in-word');
  const answerArr = answer.split('');
  const guessArr = guess.split('');
  const used = Array(answer.length).fill(false);

  // First pass: correct spots
  for (let i = 0; i < answer.length; i++) {
    if (guessArr[i] === answerArr[i]) {
      states[i] = 'correct-spot';
      used[i] = true;
    }
  }

  // Second pass: wrong spots
  for (let i = 0; i < answer.length; i++) {
    if (states[i] === 'correct-spot') continue;
    for (let j = 0; j < answer.length; j++) {
      if (!used[j] && guessArr[i] === answerArr[j]) {
        states[i] = 'wrong-spot';
        used[j] = true;
        break;
      }
    }
  }

  return states;
}

function showNextOrEnd() {
  roundOver = true;

  // Reveal the connection
  const reveal = document.getElementById('connectionReveal');
  const connText = document.getElementById('connectionText');
  const connWords = document.getElementById('connectionWords');
  connText.textContent = connection;
  connWords.textContent = `${clueWord} \u27A1 ${mysteryWord}`;
  reveal.classList.add('show');

  if (roundNum < totalRounds) {
    document.getElementById('nextBtn').classList.add('show');
  } else {
    endGame();
  }
}

/* ── Physical keyboard input ── */
document.addEventListener('keydown', e => {
  // Phase 1 active?
  const p2 = document.getElementById('phase2');
  if (!p2.classList.contains('active')) return; // let clue input handle it
  if (wordleSolved || roundOver) return;

  if (e.key === 'Enter') { e.preventDefault(); handleKey('ENTER'); }
  else if (e.key === 'Backspace') { e.preventDefault(); handleKey('DEL'); }
  else if (/^[a-zA-Z]$/.test(e.key)) { handleKey(e.key.toUpperCase()); }
});

/* ── Clue input enter key ── */
document.getElementById('clueInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkClue();
});

/* ── Round management ── */
function startRound() {
  roundNum++;
  roundOver = false;
  const [cw, mw, cat, conn] = pickPair();
  clueWord = cw;
  mysteryWord = mw;
  category = cat;
  connection = conn;

  clueAttemptsLeft = settings().clueAttempts;
  clueHintsLeft = settings().clueHints;

  // Update UI
  document.getElementById('round').textContent = roundNum;
  document.getElementById('totalRounds').textContent = totalRounds;
  document.getElementById('category').textContent = category.toUpperCase();

  // Reset phase 1
  document.getElementById('clueInput').value = '';
  document.getElementById('clueInput').disabled = false;
  document.getElementById('clueMessage').textContent = '';

  // Reset phase 2
  const p2 = document.getElementById('phase2');
  p2.classList.remove('active');
  document.getElementById('wordleGrid').innerHTML = '';
  document.getElementById('keyboard').innerHTML = '';
  document.getElementById('wordleMessage').textContent = '';
  document.getElementById('sharedInfo').textContent = '';
  document.getElementById('connectionReveal').classList.remove('show');

  document.getElementById('nextBtn').classList.remove('show');

  buildClueDisplay();
  renderClueAttempts();
  document.getElementById('clueInput').focus();
}

function nextRound() { startRound(); }

function endGame() {
  setTimeout(() => {
    const maxScore = totalRounds * (settings().cluePoints + settings().wordlePoints + settings().wordleGuesses * 8);
    const pct = Math.round(score / maxScore * 100);
    const titles = pct >= 80 ? 'Word Wizard!' : pct >= 50 ? 'Great Job!' : 'Keep Practising!';

    document.getElementById('goTitle').textContent = titles;
    document.getElementById('goScore').textContent = score;
    document.getElementById('goDetails').textContent = `Best streak: ${bestStreak} | Accuracy: ~${pct}%`;

    // Reset name entry
    document.getElementById('goNameEntry').style.display = 'flex';
    document.getElementById('goNameInput').value = '';
    document.getElementById('goSavedMsg').textContent = '';
    document.getElementById('goLeaderboard').innerHTML = '';
    lastSavedId = null;

    document.getElementById('gameOver').classList.add('show');
    setTimeout(() => document.getElementById('goNameInput').focus(), 400);
  }, 1200);
}

function restartGame() {
  score = 0; roundNum = 0; streak = 0; bestStreak = 0;
  usedPairIndices.clear();
  document.getElementById('score').textContent = 0;
  document.getElementById('streak').textContent = 0;
  document.getElementById('streakFire').classList.remove('show');
  document.getElementById('gameOver').classList.remove('show');
  startRound();
}

/* ── Confetti ── */
function spawnConfetti() {
  const colors = ['#ff79c6','#50fa7b','#f1fa8c','#8be9fd','#bd93f9','#ffb86c','#ff6e96','#c3a6ff'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (1.8 + Math.random() * 2.2) + 's';
    c.style.animationDelay = Math.random() * 0.6 + 's';
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4500);
  }
}

/* ── Leaderboard (localStorage) ── */
const LB_KEY = 'fuzzle-leaderboard';
let lastSavedId = null;

function getLeaderboard() {
  try {
    const data = JSON.parse(localStorage.getItem(LB_KEY) || '[]');
    return data.sort((a, b) => b.score - a.score).slice(0, 10);
  } catch { return []; }
}

function saveToLeaderboard(name, sc, diff) {
  const board = getLeaderboard();
  const entry = { id: Date.now(), name, score: sc, difficulty: diff, date: new Date().toLocaleDateString() };
  board.push(entry);
  board.sort((a, b) => b.score - a.score);
  const top10 = board.slice(0, 10);
  localStorage.setItem(LB_KEY, JSON.stringify(top10));
  return entry.id;
}

function renderLeaderboardTable(container, highlightId) {
  const board = getLeaderboard();
  if (board.length === 0) {
    container.innerHTML = '<div class="lb-empty">No scores yet. Be the first!</div>';
    return;
  }

  const rankIcons = ['&#129351;', '&#129352;', '&#129353;']; // gold, silver, bronze medals
  const rankClasses = ['rank-gold', 'rank-silver', 'rank-bronze'];

  let html = '<table class="lb-table"><thead><tr>';
  html += '<th>#</th><th>Name</th><th>Difficulty</th><th style="text-align:right">Score</th><th style="text-align:right">Date</th>';
  html += '</tr></thead><tbody>';

  board.forEach((entry, i) => {
    const isCurrent = entry.id === highlightId;
    const rowClass = isCurrent ? ' class="current-player"' : '';
    const rank = i < 3 ? `<span class="${rankClasses[i]}">${rankIcons[i]}</span>` : (i + 1);
    html += `<tr${rowClass}>`;
    html += `<td class="rank-cell">${rank}</td>`;
    html += `<td>${entry.name}</td>`;
    html += `<td class="diff-cell">${entry.difficulty}</td>`;
    html += `<td class="score-cell">${entry.score}</td>`;
    html += `<td class="date-cell">${entry.date}</td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function saveScore() {
  const input = document.getElementById('goNameInput');
  const name = input.value.trim() || 'Player';
  if (name.length > 12) name = name.slice(0, 12);

  lastSavedId = saveToLeaderboard(name, score, difficulty);

  document.getElementById('goNameEntry').style.display = 'none';
  document.getElementById('goSavedMsg').textContent = `Score saved, ${name}!`;

  renderLeaderboardTable(document.getElementById('goLeaderboard'), lastSavedId);
}

function showLeaderboard() {
  renderLeaderboardTable(document.getElementById('lbModalContent'), lastSavedId);
  document.getElementById('lbOverlay').classList.add('show');
}

function hideLeaderboard() {
  document.getElementById('lbOverlay').classList.remove('show');
}

// Enter key on name input
document.getElementById('goNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveScore();
});

// Go!
startRound();
</script>
