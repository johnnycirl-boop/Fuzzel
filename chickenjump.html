<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chicken Jump - Fuzzel.ie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5c16c;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;margin:0 auto}

#back-btn{position:fixed;top:10px;left:10px;z-index:50;padding:8px 16px;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;color:#fff;background:rgba(0,0,0,.2);border:1px solid rgba(0,0,0,.1);text-decoration:none;transition:background .2s}
#back-btn:hover{background:rgba(0,0,0,.3)}

.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(245,193,108,.95);backdrop-filter:blur(6px);color:#4a3520;text-align:center;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h1{font-size:clamp(36px,8vw,60px);margin-bottom:8px;color:#6b3fa0}
.overlay h2{font-size:clamp(24px,5vw,40px);margin-bottom:8px;color:#6b3fa0}
.overlay p{font-size:clamp(14px,3vw,18px);max-width:360px;line-height:1.5;margin-bottom:8px;color:#5a3a1a}
.btn{display:inline-block;padding:14px 40px;font-size:20px;font-weight:700;border:none;border-radius:12px;cursor:pointer;color:#fff;background:#6b3fa0;box-shadow:0 4px 16px rgba(107,63,160,.4);transition:transform .15s,box-shadow .15s;margin-top:12px}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(107,63,160,.5)}
.btn-small{padding:10px 24px;font-size:16px;margin-top:8px}

/* How to play cards */
.how-to{max-width:340px;background:#fff;border-radius:16px;padding:20px;margin:10px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.how-to h3{font-size:18px;color:#6b3fa0;margin-bottom:10px}
.how-to p{font-size:14px;color:#5a3a1a;margin-bottom:6px}
.how-to .step{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.how-to .step-num{width:28px;height:28px;border-radius:50%;background:#6b3fa0;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
</style>
</head>
<body>

<a id="back-btn" href="index.html">← Back</a>

<!-- Start screen -->
<div class="overlay" id="start-screen">
  <h1>🐔 Chicken Jump</h1>
  <p>Tap or press Space to jump over incoming blocks!</p>
  <div class="how-to">
    <h3>How to Play</h3>
    <div class="step"><div class="step-num">1</div><p>Tap / Space to make your chicken jump</p></div>
    <div class="step"><div class="step-num">2</div><p>Blocks slide onto your platform — jump to avoid them!</p></div>
    <div class="step"><div class="step-num">3</div><p>Land on center of the block to score a point</p></div>
    <div class="step"><div class="step-num">4</div><p>First to 20 points wins!</p></div>
  </div>
  <button class="btn" onclick="startGame()">Play!</button>
</div>

<!-- Game over screen -->
<div class="overlay hidden" id="gameover-screen">
  <h2 id="go-title">Game Over!</h2>
  <p id="go-desc"></p>
  <p id="go-score" style="font-size:24px;font-weight:700;color:#6b3fa0"></p>
  <button class="btn" onclick="startGame()">Play Again</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = Math.min(window.innerWidth, 480);
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ──
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const WIN_SCORE = 20;
const BLOCK_COLORS = ['#6b3fa0','#8b5fbf','#a855a0','#c0392b','#e74c3c','#d35400','#7b4fa0','#9b59b6'];
const PLATFORM_COLOR = '#5a3520';
const PLATFORM_TOP_COLOR = '#7a5030';
const SKY_TOP = '#f5c16c';
const SKY_BOTTOM = '#e8a84c';
const MOUNTAIN_COLOR = 'rgba(200,150,80,.3)';
const CLOUD_COLOR = 'rgba(255,255,255,.6)';

// ── State ──
let state, animId;

function newState() {
  const platY = canvas.height * 0.7;
  const platW = 120;
  const platX = (canvas.width - platW) / 2;
  return {
    running: false,
    chicken: {
      x: canvas.width / 2,
      y: platY - 40,
      w: 36, h: 36,
      vy: 0,
      grounded: true,
      jumpCount: 0
    },
    platform: { x: platX, y: platY, w: platW, h: 16 },
    blocks: [],
    stack: [],
    score: 0,
    lives: 3,
    spawnTimer: 0,
    spawnInterval: 126,
    speed: 1.5,
    frame: 0,
    clouds: Array.from({length: 5}, () => ({
      x: Math.random() * 480,
      y: 50 + Math.random() * (canvas.height * 0.3),
      w: 40 + Math.random() * 60,
      speed: 0.3 + Math.random() * 0.5
    })),
    particles: [],
    combo: 0,
    lastLand: ''
  };
}

// ── Drawing ──
function drawBg() {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grd.addColorStop(0, SKY_TOP);
  grd.addColorStop(1, SKY_BOTTOM);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Mountains
  ctx.fillStyle = MOUNTAIN_COLOR;
  const mh = canvas.height * 0.25;
  const my = state.platform.y - mh + 40;
  ctx.beginPath();
  ctx.moveTo(0, state.platform.y + 20);
  for (let i = 0; i <= 6; i++) {
    const px = (i / 6) * canvas.width;
    const py = my + Math.sin(i * 1.8) * mh * 0.4;
    if (i === 0) ctx.lineTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.lineTo(canvas.width, state.platform.y + 20);
  ctx.closePath();
  ctx.fill();

  // Clouds
  ctx.fillStyle = CLOUD_COLOR;
  for (const c of state.clouds) {
    drawCloud(c.x, c.y, c.w);
  }
}

function drawCloud(x, y, w) {
  const h = w * 0.4;
  ctx.beginPath();
  ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.ellipse(x - w * 0.25, y + h * 0.15, w * 0.3, h * 0.35, 0, 0, Math.PI * 2);
  ctx.ellipse(x + w * 0.25, y + h * 0.1, w * 0.35, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlatform() {
  const p = state.platform;
  // Platform shadow
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  ctx.fillRect(p.x + 4, p.y + 4, p.w, p.h + 8);
  // Platform body
  ctx.fillStyle = PLATFORM_COLOR;
  ctx.fillRect(p.x, p.y, p.w, p.h + 8);
  // Platform top
  ctx.fillStyle = PLATFORM_TOP_COLOR;
  ctx.fillRect(p.x, p.y, p.w, p.h);

  // Draw stacked blocks
  for (let i = 0; i < state.stack.length; i++) {
    const s = state.stack[i];
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x, s.y, s.w, s.h);
    // Darker edge
    ctx.fillStyle = 'rgba(0,0,0,.15)';
    ctx.fillRect(s.x, s.y + s.h - 3, s.w, 3);
  }
}

function drawChicken() {
  const c = state.chicken;
  const cx = c.x, cy = c.y;
  const bob = c.grounded ? Math.sin(state.frame * 0.08) * 2 : 0;
  const squish = c.grounded ? 1 : (c.vy < 0 ? 0.85 : 1.1);

  ctx.save();
  ctx.translate(cx, cy + bob);
  ctx.scale(1, squish);

  // Body
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#ffe680';
  ctx.beginPath();
  ctx.ellipse(0, 3, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-5, -4, 3, 0, Math.PI * 2);
  ctx.arc(5, -4, 3, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-4, -5, 1.2, 0, Math.PI * 2);
  ctx.arc(6, -5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(-3, -1);
  ctx.lineTo(3, -1);
  ctx.lineTo(0, 3);
  ctx.closePath();
  ctx.fill();

  // Comb (on top)
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(-3, -13, 4, 0, Math.PI * 2);
  ctx.arc(3, -14, 3.5, 0, Math.PI * 2);
  ctx.arc(0, -11, 3, 0, Math.PI * 2);
  ctx.fill();

  // Feet
  if (c.grounded) {
    ctx.fillStyle = '#e67e22';
    ctx.fillRect(-8, 12, 4, 4);
    ctx.fillRect(4, 12, 4, 4);
  }

  ctx.restore();
}

function drawBlock(b) {
  ctx.fillStyle = b.color;
  const r = 4;
  ctx.beginPath();
  ctx.roundRect(b.x, b.y, b.w, b.h, r);
  ctx.fill();
  // Shadow on bottom
  ctx.fillStyle = 'rgba(0,0,0,.2)';
  ctx.fillRect(b.x + 2, b.y + b.h - 4, b.w - 4, 4);
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Score
  ctx.fillStyle = 'rgba(0,0,0,.15)';
  ctx.beginPath();
  ctx.arc(40, 50, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(state.score, 40, 50);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.fillText('/ ' + WIN_SCORE, 40, 70);

  // Lives
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('❤'.repeat(Math.max(0, state.lives)), canvas.width - 16, 50);

  // Landing feedback
  if (state.lastLand && state.frame % 60 < 40) {
    ctx.fillStyle = state.lastLand === 'center' ? '#27ae60' : '#e74c3c';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(state.lastLand === 'center' ? '+1 PERFECT!' : 'MISS!', canvas.width / 2, state.platform.y - 80);
  }

  // Progress bar
  const barW = canvas.width - 80;
  const barH = 6;
  const barX = 40;
  const barY = 86;
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#6b3fa0';
  ctx.fillRect(barX, barY, barW * (state.score / WIN_SCORE), barH);
}

// ── Particles ──
function spawnLandParticles(x, y, good) {
  const colors = good ? ['#ffd93d','#27ae60','#fff'] : ['#e74c3c','#ff6b6b','#fff'];
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 2 + Math.random() * 3,
      life: 1,
      decay: 0.03 + Math.random() * 0.02,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// ── Update ──
function update() {
  const s = state;
  s.frame++;

  // Clouds
  for (const c of s.clouds) {
    c.x += c.speed;
    if (c.x - c.w > canvas.width) { c.x = -c.w; c.y = 50 + Math.random() * (canvas.height * 0.3); }
  }

  // Chicken physics
  const ch = s.chicken;
  if (!ch.grounded) {
    ch.vy += GRAVITY;
    ch.y += ch.vy;
  }

  // Find top surface (platform or top of stack)
  let topY = s.platform.y;
  if (s.stack.length > 0) {
    topY = s.stack[s.stack.length - 1].y;
  }
  const groundY = topY - ch.h / 2 - 2;

  // Landing
  if (ch.y >= groundY && ch.vy > 0) {
    ch.y = groundY;
    ch.vy = 0;
    ch.grounded = true;
    ch.jumpCount = 0;
  }

  // Spawn blocks
  s.spawnTimer++;
  // Spawn interval ramps from 126 → 45 frames as score climbs (gentler at start, faster late)
  const interval = Math.max(45, s.spawnInterval - s.score * 4);
  if (s.spawnTimer >= interval) {
    s.spawnTimer = 0;
    const fromLeft = Math.random() > 0.5;
    const bw = 40 + Math.random() * 40;
    const bh = 14 + Math.random() * 8;
    const color = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
    // Block speed ramps from 1.5 → ~5.5 as score climbs (slower opening, harder finish)
    const speed = s.speed + s.score * 0.18 + Math.random() * 0.6;
    s.blocks.push({
      x: fromLeft ? -bw : canvas.width,
      y: topY - bh,
      w: bw, h: bh,
      vx: fromLeft ? speed : -speed,
      color,
      landed: false
    });
  }

  // Update blocks
  const platLeft = s.platform.x;
  const platRight = s.platform.x + s.platform.w;
  const platCenter = s.platform.x + s.platform.w / 2;

  for (let i = s.blocks.length - 1; i >= 0; i--) {
    const b = s.blocks[i];
    b.x += b.vx;

    // Check if block is on platform area
    const bCenter = b.x + b.w / 2;
    const onPlatform = b.x + b.w > platLeft && b.x < platRight;

    if (onPlatform && !b.landed) {
      b.landed = true;
      b.vx = 0;

      // Check if chicken is on ground level (not jumping)
      if (ch.grounded) {
        // Knocked off! Lose a life
        s.lives--;
        s.lastLand = 'hit';
        spawnLandParticles(ch.x, ch.y, false);

        // Remove block
        s.blocks.splice(i, 1);

        if (s.lives <= 0) {
          gameOver(false);
          return;
        }
        // Brief immunity - bounce chicken up
        ch.vy = JUMP_FORCE * 0.6;
        ch.grounded = false;
        continue;
      } else {
        // Chicken is in the air - block stacks
        // Check if landing is centered
        const distFromCenter = Math.abs(bCenter - platCenter);
        const centerThreshold = s.platform.w * 0.3;

        if (distFromCenter < centerThreshold) {
          s.score++;
          s.combo++;
          s.lastLand = 'center';
          spawnLandParticles(bCenter, b.y, true);
        } else {
          s.lastLand = 'off';
          s.combo = 0;
        }

        // Stack the block
        s.stack.push({
          x: b.x, y: b.y, w: b.w, h: b.h, color: b.color
        });
        s.blocks.splice(i, 1);

        if (s.score >= WIN_SCORE) {
          gameOver(true);
          return;
        }
        continue;
      }
    }

    // Remove off-screen blocks
    if (b.x > canvas.width + 100 || b.x + b.w < -100) {
      s.blocks.splice(i, 1);
    }
  }

  // Chicken collision with moving blocks
  for (let i = s.blocks.length - 1; i >= 0; i--) {
    const b = s.blocks[i];
    if (b.landed) continue;
    if (ch.x + ch.w / 2 > b.x && ch.x - ch.w / 2 < b.x + b.w &&
        ch.y + ch.h / 2 > b.y && ch.y - ch.h / 2 < b.y + b.h) {
      if (ch.grounded) {
        s.lives--;
        s.lastLand = 'hit';
        spawnLandParticles(ch.x, ch.y, false);
        s.blocks.splice(i, 1);
        if (s.lives <= 0) {
          gameOver(false);
          return;
        }
        ch.vy = JUMP_FORCE * 0.6;
        ch.grounded = false;
      }
    }
  }

  // Particles
  for (let i = s.particles.length - 1; i >= 0; i--) {
    const p = s.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) s.particles.splice(i, 1);
  }

  // Clear landing text after a bit
  if (s.frame % 60 === 0) s.lastLand = '';

  // Keep stack from getting too tall - remove bottom blocks
  while (s.stack.length > 12) {
    s.stack.shift();
  }
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();
  drawPlatform();
  for (const b of state.blocks) drawBlock(b);
  drawChicken();
  drawParticles();
  drawHUD();
}

// ── Game loop ──
function loop() {
  if (!state.running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Controls ──
function jump() {
  if (!state || !state.running) return;
  const ch = state.chicken;
  if (ch.jumpCount < 2) {
    ch.vy = JUMP_FORCE;
    ch.grounded = false;
    ch.jumpCount++;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

// ── Start / Game over ──
function startGame() {
  state = newState();
  state.running = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function gameOver(won) {
  state.running = false;
  document.getElementById('go-title').textContent = won ? '🎉 You Win!' : '💥 Game Over!';
  document.getElementById('go-desc').textContent = won
    ? 'You reached ' + WIN_SCORE + ' points! Amazing jumping!'
    : 'You got knocked off the platform!';
  document.getElementById('go-score').textContent = 'Score: ' + state.score + ' / ' + WIN_SCORE;
  document.getElementById('gameover-screen').classList.remove('hidden');
}
</script>
</body>
</html>
